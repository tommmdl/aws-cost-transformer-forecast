services:
  api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./checkpoints:/app/checkpoints:ro
    environment:
      - CHECKPOINT_PATH=/app/checkpoints/model.pt

  # Generates/updates the checkpoint inside the same environment as the
  # image, without needing uv installed on the host. Does not start with
  # `docker compose up` (gated behind the "train" profile); run with:
  #   docker compose run --rm train
  train:
    build: .
    profiles: ["train"]
    volumes:
      - ./checkpoints:/app/checkpoints
    entrypoint: ["python", "-m", "aws_cost_forecast.training.train"]
